{% extends 'base_v2.html' %}

{% block title %}Server xatosi — TrendoAI{% endblock %}
{% block meta_robots %}noindex, nofollow{% endblock %}

{% block content %}
<section class="min-h-[60vh] flex items-center justify-center py-20">
    <div class="container-narrow text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400 mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <p class="text-9xl font-extrabold tracking-tight text-ink-900 dark:text-white">500</p>
        <h1 class="mt-2 text-2xl sm:text-3xl font-bold text-ink-900 dark:text-white">Server xatosi</h1>
        <p class="mt-3 text-ink-600 dark:text-ink-400 max-w-md mx-auto">
            Ichki server xatosi yuz berdi. Iltimos, bir necha daqiqadan keyin qaytib urinib ko'ring.
        </p>
        <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
            <a href="{{ url_for('index') }}" class="btn-accent">Bosh sahifaga</a>
            <button type="button" onclick="window.location.reload()" class="btn-ghost">Qayta yuklash</button>
        </div>
    </div>
</section>
{% endblock %}
